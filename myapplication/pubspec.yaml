name: frontend
description: "Rely App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  permission_handler: ^12.0.1
  watch_connectivity: ^0.2.4
  health: 12.0.0
  pedometer: ^4.0.1
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  firebase_database: ^11.1.0
  cloud_firestore: ^5.6.12
  flutter_launcher_icons: ^0.13.1
  tflite_flutter: ^0.12.1
  flutter_foreground_task: ^6.1.0
  audioplayers: ^5.2.1
  youtube_player_flutter: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Bagian Konfigurasi Ikon
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0F1221"
  adaptive_icon_foreground: "assets/images/logo_foreground.png"

# Bagian UTAMA Flutter (Aset ditaruh di sini)
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/model_emotion_lite.tflite
    - assets/scaler_params.json
    - assets/audio/meditation.mp3